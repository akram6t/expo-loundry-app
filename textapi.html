<script>
    // client.js
async function fetchData() {
  try {
    // Define the parameters
    const params = {
      collection: 'addons',
    //   filter: JSON.stringify({}),
    //   select: JSON.stringify({}),
    //   sort: JSON.stringify({}),
    //   limit: 2
    };

    // Convert parameters object to URLSearchParams
    const queryParams = new URLSearchParams(params);

    // Make an HTTP request to your server with the parameters using fetch
    const response = await fetch(`http://localhost:5000/admin/apis/get_list?${queryParams}`);
    
    // Check if the response status is ok
    if (!response.ok) {
      throw new Error(`HTTP error! Status: ${response.status}`);
    }

    // Parse the JSON response
    const responseData = await response.json();

    // Log the response from the server
    console.log('Response from Server:', responseData);
  } catch (error) {
    console.error('Error:', error.message);
  }
}

// Call the fetchData function when the page is loaded
fetchData();

</script>
